name: Validate submissions

# Runs on every PR. Must pass before a maintainer merges. Never deploys.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate all community submissions
        run: node scripts/validate-submission.mjs
